```
<div class="logo">🔑 Two-Factor Verification</div>
<p class="subtitle">
  Ingresa el código de tu app de autenticación
</p>

<div class="card">

  {% if error %}
    <div class="field-error" style="margin-bottom:10px;">
      {{ error }}
    </div>
  {% endif %}

  <form method="post">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

    <div class="input-group">
      <label>Authentication Code</label>
      <input 
        type="text" 
        name="code" 
        placeholder="123456"
        maxlength="6"
        required
      >
    </div>

    <button class="btn" type="submit">
      Verify
    </button>

  </form>

  <div class="link">
    <a href="{{ url_for('login') }}">← Volver al login</a>
  </div>

</div>

<div class="footer">
  Este código cambia cada 30 segundos
</div>
