name: DAP Security & DevSecOps Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ETAPA 1: Búsqueda de secretos (No permite avanzar si hay leaks)
  secrets-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0 # Necesario para escanear todo el historial
      - name: Gitleaks Scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ETAPA 2: Análisis de Dependencias y Aplicación de DREAD
  security-analysis:
    needs: secrets-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          pip install pip-audit grype trivy # Asegúrate de tener los binarios/libs

      - name: Run Multi-Scanner DAP
        run: |
          # Ejecutamos tu scanner principal que ya integra Grype, OSV, etc.
          python -m src.scanner --requirements requirements.txt --output report.json

      - name: DREAD Gate Keeper (Fail-Build Logic)
        run: |
          python - <<'PY'
          import json
          import sys
          try:
              with open('db_scan_results.json') as f:
                  data = json.load(f)
              
              # Buscamos si alguna vulnerabilidad supera el umbral crítico de DREAD
              CRITICAL_THRESHOLD = 8.5
              critical_findings = [v for v in data if v.get('dread_score', 0) >= CRITICAL_THRESHOLD]
              
              if critical_findings:
                  print(f"\n[!] SECURITY GATE FAILED")
                  print(f"[!] Found {len(critical_findings)} vulnerabilities with DREAD score >= {CRITICAL_THRESHOLD}")
                  for v in critical_findings:
                      print(f"    - {v['vuln_id']} in {v['package']} (Score: {v['dread_score']})")
                  sys.exit(1)
              
              print("\n[+] Security Gate Passed: No critical DREAD scores found.")
          except FileNotFoundError:
              print("[-] No scan results found to analyze.")
              sys.exit(1)
          PY

      - name: Upload Scan Report
        if: always() # Sube el reporte incluso si el gate falla
        uses: actions/upload-artifact@v4
        with:
          name: dap-security-reports
          path: |
            db_scan_results.json
            pip_audit.json

      - name: Generate Markdown Report
        if: always() # Queremos el reporte incluso si el Gate Keeper falló
        run: python src/utils/report_gen.py

      - name: Post PR Comment
        if: github.event_name == 'pull_request' && always()
        uses: mshick/add-pr-comment@v2
        with:
          message-path: dap_report.md
          allow-repeats: false # Actualiza el mismo comentario en lugar de inundar el PR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ETAPA 3: Análisis Estático (SAST)
  sast-scan:
    needs: secrets-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Semgrep Scan
        uses: returntocorp/semgrep-action@v1
        with:
          config: "p/default"